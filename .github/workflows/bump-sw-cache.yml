name: Bump SW cache version
on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'index.html'
      - 'vecchio.html'
      - 'sw.js'
      - 'manifest.webmanifest'
      - 'reporter.html'
      - 'images/**'
      - 'icon_small.png'
      - 'icon_big_360.png'
      - 'marco2.png'
permissions:
  contents: write
concurrency:
  group: bump-sw-cache
  cancel-in-progress: true
jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Stamp build version into sw.js, index.html and vecchio.html
        run: |
          NEW_VERSION="$(TZ='Australia/Sydney' date +'%Y%m%d-%H%M%S')"
          echo "New build version: $NEW_VERSION"
          # 1) sw.js cache version — declared with const.
          if [ -f sw.js ]; then
            sed -i "s/const CACHE_VERSION = '[^']*';/const CACHE_VERSION = '${NEW_VERSION}';/" sw.js
            grep -q "const CACHE_VERSION = '${NEW_VERSION}';" sw.js \
              || { echo "ERROR: CACHE_VERSION stamp did not apply in sw.js"; exit 1; }
            grep "const CACHE_VERSION" sw.js
          else
            echo "sw.js not found - skipping cache bump."
          fi
          # 2) index.html (nuovo) visible build stamp — declared with var.
          if [ -f index.html ]; then
            sed -i "s/var APP_BUILD = '[^']*';/var APP_BUILD = '${NEW_VERSION}';/" index.html
            grep -q "var APP_BUILD = '${NEW_VERSION}';" index.html \
              || { echo "ERROR: APP_BUILD stamp did not apply in index.html"; exit 1; }
            grep "var APP_BUILD" index.html
          else
            echo "index.html not found - skipping stamp."
          fi
          # 3) vecchio.html (the NS-outage fallback app) — same stamp, same guard.
          #    Without this, tuning vecchio leaves its APP_BUILD frozen and users
          #    keep the cached copy: the failover would serve stale bytes exactly
          #    when it matters. Absent on purpose is fine; silently unstamped is not.
          if [ -f vecchio.html ]; then
            sed -i "s/var APP_BUILD = '[^']*';/var APP_BUILD = '${NEW_VERSION}';/" vecchio.html
            grep -q "var APP_BUILD = '${NEW_VERSION}';" vecchio.html \
              || { echo "ERROR: APP_BUILD stamp did not apply in vecchio.html"; exit 1; }
            grep "var APP_BUILD" vecchio.html
          else
            echo "vecchio.html not found - skipping stamp."
          fi
      - name: Commit the bump
        run: |
          # Only reference files that actually exist — vecchio.html was retired
          # (deleted 12 Jul 2026) and a bare `git add vecchio.html` on a missing
          # path fails with exit 128, which is what silently broke every stamp
          # after the deletion. Rebuild the list from what's present so the job is
          # robust whether or not vecchio.html is ever restored.
          FILES=""
          for f in sw.js index.html vecchio.html; do
            [ -f "$f" ] && FILES="$FILES $f"
          done
          if [ -z "$FILES" ] || git diff --quiet -- $FILES; then
            echo "Nothing changed - nothing to commit."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -- $FILES
          git commit -m "chore: stamp build version [skip ci]"
          git push
